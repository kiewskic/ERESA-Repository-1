<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Cooper K's Demo Page</title>
  <style>
    body {
      background: linear-gradient( 0deg,  rgb(204, 0, 255) 11.2%, rgb(0, 255, 106) 81.7% );
      background-size: cover;
      background-attachment: fixed;
    }
    div {
      background: rgb(105, 105, 105);
      border: 10px solid rgb(47, 47, 47);
      width: 500px;
      height: 100px;
      padding: 20px;
      margin: 20px;
      border-radius: 30px;
    }

    #one {
      background: rgb(0, 255, 26);
      border: 10px solid black;
      border-bottom: 25px solid black;
      color: white;
      margin-left: 200px;
      border-bottom-left-radius: 0px;
      border-bottom-right-radius: 0px;
      border-top-right-radius: 200px;
      border-top-left-radius: 200px;
      text-align: center;
    }

    #two {
      margin-left: auto;
      margin-right: auto;
      text-align: center;
    }
    #three {
      width: 800px;
      height: 100px;
      background-image: linear-gradient( 270deg,  rgb(255, 0, 106) 11.2%, rgb(251, 255, 0) 81.7% );
    }
    #four {
      width: 200px;
      height: 25px;
    }
  </style>
</head>

<body>
  <div id="one">
    <p>might be a box?</p>
  </div>
  <div id="two">
    <p>this is a box!</p>
  </div>
  <div id="three">
    <p>this is a box!</p>
    <div id="four">
      <p>this is a box!</p>
    </div>
  </div>
</body>

</html>
