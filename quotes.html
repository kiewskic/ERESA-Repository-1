!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Cooper's Quote Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
  body {
    background: #ff002f;
    color: #cdcdcd;
    font-family: Arial, Helvetica, sans-serif;
  }
  p {
    font-weight: 900;
    color: rgb(0, 255, 34);
    font-size: 50px;
    text-align: center;
    text-decoration: line-through;
    text-transform: uppercase;
  }
  hr {
    color: rgb(255, 0, 43);
  }
  .cite2 {
    color: #00ff2a;
    font-family: "Orbitron", sans-serif;
    text-decoration: none; 
    text-align: right;
  }
  </style>
</head>

<body>
  <h2>I knew a traveler from an antique land who said.</h2>
  <p>Percy Bysshe Shelley</p>
  <hr>
  <h2>Foot? Mmmm foot...</h2>
  <p class="cite2">Michael Oakes</p>
  <hr>
  <h2>War.</h2>
  <p>Sun Tzu</p>

</html>
